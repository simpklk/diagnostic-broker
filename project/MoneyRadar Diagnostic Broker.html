  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

olor:var(--t-d);display:inline-flex;align-items:center;gap:6px;}\n  .mrqc-kicker::before{content:\"\";width:14px;height:1.5px;background:var(--t);}\n  .mrqc-step-badge{font-size:11.5px;font-weight:600;color:var(--soft);background:var(--paper);padding:4px 10px;border-radius:999px;border:1px solid var(--border);font-variant-numeric:tabular-nums;}\n  .mrqc-step-badge b{color:var(--t-d);font-weight:700;}\n\n  .mrqc-prog{display:flex;gap:4px;margin-bottom:20px;}\n  .mrqc-prog span{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s ease;}\n  .mrqc-prog span.on{background:var(--t);}\n\n  .mrqc-step{display:none;flex-direction:column;flex:1;}\n  .mrqc-step.active{display:flex;}\n\n  .mrqc-q{font-size:19px;font-weight:700;line-height:1.3;letter-spacing:-0.015em;margin:0 0 4px;color:var(--ink);}\n  .mrqc-q em{font-style:normal;color:var(--t-d);background:var(--t-l);padding:1px 6px 2px;border-radius:4px;}\n  .mrqc-q-sub{font-size:12.5px;color:var(--soft);margin:0 0 16px;}\n\n  .mrqc-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}\n  .mrqc-opts.one-col{grid-template-columns:1fr;}\n  @media (max-width:420px){.mrqc-opts{grid-template-columns:1fr;}}\n\n  .mrqc-opt{position:relative;display:block;padding:13px 36px 13px 14px;border:1.5px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;text-align:left;transition:border-color .15s,background .15s,opacity .15s;-webkit-tap-highlight-color:transparent;}\n  .mrqc-opt:hover{border-color:var(--t);background:var(--t-l);}\n  .mrqc-opt.selected{border-color:var(--t);background:var(--t-l);}\n  .mrqc-opt-ic{font-size:15px;line-height:1;margin-bottom:7px;display:block;}\n  .mrqc-opt-t{font-size:13.5px;font-weight:700;margin:0 0 1px;color:var(--ink);}\n  .mrqc-opt-d{font-size:11.5px;color:var(--soft);line-height:1.35;margin:0;}\n  .mrqc-opt-chk{position:absolute;top:12px;right:12px;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border-s);background:#fff;}\n  .mrqc-opt.selected .mrqc-opt-chk{background:var(--t);border-color:var(--t);}\n  .mrqc-opt.selected .mrqc-opt-chk::after{content:\"\";display:block;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg) translate(-1px,-1px);margin:3px auto 0;}\n\n  /* Option bloquée (incompatible avec choix précédent) */\n  .mrqc-opt.blocked{opacity:.5;cursor:not-allowed;background:var(--paper);border-color:var(--border);position:relative;}\n  .mrqc-opt.blocked:hover{border-color:var(--border);background:var(--paper);}\n  .mrqc-opt.blocked::after{content:attr(data-blocked-msg);position:absolute;bottom:8px;right:14px;font-size:10px;color:var(--bad);font-weight:700;background:rgba(220,38,38,.08);padding:1px 6px;border-radius:3px;border:1px solid rgba(220,38,38,.25);}\n  .mrqc-opt.blocked .mrqc-opt-chk{opacity:0;}\n\n  .mrqc-opt.prio-1 .mrqc-opt-chk{background:var(--t);border-color:var(--t);}\n  .mrqc-opt.prio-1 .mrqc-opt-chk::after{content:\"1\";display:block;color:#fff;font-size:11px;font-weight:800;line-height:15px;text-align:center;transform:none;border:none;width:auto;height:auto;margin:0;}\n  .mrqc-opt.prio-2 .mrqc-opt-chk{background:var(--gold);border-color:var(--gold);}\n  .mrqc-opt.prio-2 .mrqc-opt-chk::after{content:\"2\";display:block;color:#fff;font-size:11px;font-weight:800;line-height:15px;text-align:center;transform:none;border:none;width:auto;height:auto;margin:0;}\n  .mrqc-opt.prio-1{border-color:var(--t);background:var(--t-l);}\n  .mrqc-opt.prio-2{border-color:var(--gold);background:#FEF7E0;}\n\n  .mrqc-brokers{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}\n  @media (max-width:520px){.mrqc-brokers{grid-template-columns:repeat(3,1fr);}}\n  .mrqc-bk{padding:10px 6px 8px;border:1.5px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;text-align:center;transition:border-color .15s,background .15s;position:relative;}\n  .mrqc-bk:hover{border-color:var(--t);background:var(--t-l);}\n  .mrqc-bk.selected{border-color:var(--t);background:var(--t-l);}\n  .mrqc-bk-logo{width:100%;aspect-ratio:2.4/1;border-radius:4px;background:var(--paper);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10.5px;letter-spacing:-0.02em;color:var(--soft);margin-bottom:5px;line-height:1.1;}\n  .mrqc-bk-name{font-size:11.5px;font-weight:600;color:var(--ink);}\n  .mrqc-bk-note{position:absolute;top:4px;right:4px;font-size:9px;font-weight:700;color:var(--mute);background:var(--paper);padding:1px 4px;border-radius:3px;border:1px solid var(--border);}\n  .mrqc-bk-extras{display:flex;gap:6px;margin-top:6px;}\n  .mrqc-bk-mini{flex:1;padding:8px 10px;border:1.5px dashed var(--border-s);border-radius:10px;background:#fff;cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--soft);transition:border-color .15s,background .15s,color .15s;-webkit-tap-highlight-color:transparent;}\n  .mrqc-bk-mini:hover{border-color:var(--t);background:var(--t-l);color:var(--t-d);}\n  .mrqc-bk-mini.selected{border-color:var(--t);background:var(--t-l);color:var(--t-d);border-style:solid;}\n\n  .mrqc-nav{margin-top:auto;padding-top:18px;display:flex;justify-content:space-between;align-items:center;gap:10px;}\n  .mrqc-back,.mrqc-restart{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:500;color:var(--soft);background:none;border:none;cursor:pointer;padding:6px 2px;transition:color .15s;}\n  .mrqc-back:hover,.mrqc-restart:hover{color:var(--t-d);}\n  .mrqc-hint{font-size:11px;color:var(--mute);display:inline-flex;align-items:center;gap:4px;}\n  .mrqc-hint::before{content:\"\\2191\";font-weight:700;color:var(--t);}\n  .mrqc-cta-next{background:var(--t);color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:12.5px;font-weight:700;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:6px;}\n  .mrqc-cta-next:hover{background:var(--t-d);}\n  .mrqc-cta-next:disabled{background:var(--border-s);cursor:not-allowed;}\n\n  .mrqc-right{background:#FAFAFB;padding:22px;display:flex;flex-direction:column;min-width:0;}\n  @media (max-width:760px){.mrqc-right{padding:16px 18px 18px;}}\n  .mrqc-r-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}\n  .mrqc-r-title{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);}\n  .mrqc-r-live{font-size:10px;font-weight:700;color:var(--t);display:inline-flex;align-items:center;gap:5px;letter-spacing:.06em;}\n  .mrqc-r-live::before{content:\"\";width:6px;height:6px;border-radius:50%;background:var(--t);box-shadow:0 0 0 3px rgba(0,137,123,.2);animation:mrqc-pulse 1.8s ease-in-out infinite;}\n  @keyframes mrqc-pulse{0%,100%{box-shadow:0 0 0 3px rgba(0,137,123,.2);}50%{box-shadow:0 0 0 5px rgba(0,137,123,.08);}}\n  .mrqc-r-sub{font-size:12px;color:var(--soft);margin-bottom:14px;}\n  .mrqc-r-sub b{color:var(--ink);font-weight:700;}\n  .mrqc-wrap.done .mrqc-r-live{color:var(--ok);}\n  .mrqc-wrap.done .mrqc-r-live::before{background:var(--ok);box-shadow:0 0 0 3px rgba(5,150,105,.2);animation:none;}\n\n  .mrqc-sl{display:flex;flex-direction:column;gap:6px;flex:1;min-height:0;}\n  .mrqc-sl-item{display:grid;grid-template-columns:22px 32px 1fr auto;align-items:center;gap:10px;padding:8px 11px;background:#fff;border:1px solid var(--border);border-radius:8px;transition:opacity .4s,border-color .2s,box-shadow .2s,order .4s;opacity:.55;}\n  .mrqc-sl-item.lit{opacity:1;}\n  .mrqc-wrap .mrqc-sl-item.dq{opacity:.4 !important;border-style:dashed !important;border-color:var(--border-s) !important;}\n  .mrqc-wrap .mrqc-sl-item.dq .mrqc-sl-name,.mrqc-wrap .mrqc-sl-item.dq .mrqc-sl-logo{filter:grayscale(.6);}\n  .mrqc-wrap .mrqc-sl-item.rescued{opacity:.85 !important;border-color:var(--amber) !important;background:var(--amber-bg) !important;border-style:solid !important;}\n  .mrqc-wrap .mrqc-sl-item.rescued .mrqc-sl-name,.mrqc-wrap .mrqc-sl-item.rescued .mrqc-sl-logo{filter:none;}\n  .mrqc-wrap .mrqc-sl-dq{display:inline-block !important;visibility:visible !important;margin-left:6px !important;font-size:9.5px !important;font-weight:700 !important;color:#DC2626 !important;background:rgba(220,38,38,.08) !important;border:1px solid rgba(220,38,38,.25) !important;padding:1px 5px !important;border-radius:3px !important;white-space:nowrap !important;text-transform:none !important;line-height:1.4 !important;}\n  .mrqc-wrap .mrqc-sl-compromise{display:inline-block !important;visibility:visible !important;margin-left:6px !important;font-size:9.5px !important;font-weight:700 !important;color:#92400E !important;background:var(--amber-bg) !important;border:1px solid var(--amber) !important;padding:1px 5px !important;border-radius:3px !important;white-space:nowrap !important;text-transform:none !important;line-height:1.4 !important;}\n  .mrqc-sl-item.current{outline:2px dashed var(--mute);outline-offset:-2px;}\n  .mrqc-sl-item.top{border-color:var(--t);}\n  .mrqc-sl-item.winner{background:var(--t-l);box-shadow:0 2px 0 rgba(0,137,123,.15);}\n  .mrqc-sl-rank{font-size:11px;font-weight:700;color:var(--mute);font-variant-numeric:tabular-nums;text-align:center;visibility:hidden;}\n  .mrqc-sl-item.show-rank .mrqc-sl-rank{visibility:visible;}\n  .mrqc-sl-item.top .mrqc-sl-rank{color:var(--t-d);}\n  .mrqc-sl-logo{height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9.5px;letter-spacing:-0.02em;color:#fff;overflow:hidden;}\n  .mrqc-sl-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n  .mrqc-sl-pts{display:inline-flex;gap:3px;margin-left:6px;font-size:9.5px;font-weight:700;font-variant-numeric:tabular-nums;align-items:center;}\n  .mrqc-sl-pts-base{background:var(--paper);color:var(--mute);padding:1px 6px;border-radius:3px;border:1px solid var(--border);}\n  .mrqc-sl-pts-badge{background:var(--t-l);color:var(--t-d);padding:1px 5px;border-radius:3px;white-space:nowrap;}\n\n  .mrqc-r-note{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);font-size:10.5px;color:var(--mute);line-height:1.5;}\n\n  .mrqc-wrap .mrqc-verdict{padding:16px 18px;border-radius:10px;background:linear-gradient(160deg,var(--t-d) 0%,var(--t) 100%);color:#fff !important;margin-bottom:14px;}\n  .mrqc-wrap .mrqc-verdict-lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.8;margin-bottom:5px;color:#fff !important;}\n  .mrqc-wrap .mrqc-verdict-title{font-size:16px !important;font-weight:700 !important;line-height:1.3 !important;letter-spacing:-0.01em;margin:0 0 6px !important;color:#fff !important;background:transparent !important;padding:0 !important;}\n  .mrqc-wrap .mrqc-verdict-desc{font-size:12.5px;line-height:1.5;opacity:.92;margin:0;color:#fff !important;}\n\n  /* Bandeau de transparence sur les compromis levés */\n  .mrqc-compromise-banner{margin-bottom:12px;padding:12px 14px;background:var(--amber-bg);border:1.5px solid var(--amber);border-radius:10px;display:flex;gap:10px;align-items:flex-start;}\n  .mrqc-compromise-banner-ic{font-size:18px;line-height:1.2;flex-shrink:0;}\n  .mrqc-compromise-banner-text{font-size:12px;line-height:1.5;color:#78350F;margin:0;}\n  .mrqc-compromise-banner-text b{color:#451A03;font-weight:700;}\n\n  .mrqc-compare-box{margin-bottom:14px;padding:14px 16px;background:#fff;border:1.5px solid var(--t);border-radius:10px;border-left-width:4px;}\n  .mrqc-compare-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t-d);margin-bottom:6px;display:flex;align-items:center;gap:6px;}\n  .mrqc-compare-lbl::before{content:\"\\2192\";font-size:13px;}\n  .mrqc-compare-text{font-size:13px;line-height:1.55;color:var(--ink);margin:0;}\n  .mrqc-compare-text b{color:var(--t-d);font-weight:700;}\n  .mrqc-compare-args{margin:10px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px;}\n  .mrqc-compare-args li{font-size:12px;line-height:1.5;color:var(--soft);padding-left:18px;position:relative;}\n  .mrqc-compare-args li::before{content:\"\\2713\";position:absolute;left:0;top:0;color:var(--ok);font-weight:700;font-size:12px;}\n\n  .mrqc-alt-box{margin-top:10px;padding:12px 14px;background:var(--paper);border:1px dashed var(--border-s);border-radius:8px;}\n  .mrqc-alt-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);margin-bottom:4px;}\n  .mrqc-alt-text{font-size:12px;line-height:1.5;color:var(--soft);margin:0;}\n  .mrqc-alt-text b{color:var(--ink);}\n\n  .mrqc-result-cards{display:flex;flex-direction:column;gap:8px;}\n  .mrqc-result-card{display:grid;grid-template-columns:28px 1fr auto;gap:12px;align-items:center;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:10px;}\n  .mrqc-result-card.rank1{border-color:var(--t);background:var(--t-l);}\n  .mrqc-result-card.has-compromise{border-color:var(--amber);background:var(--amber-bg);}\n  .mrqc-result-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700;background:var(--border-s);color:#fff;}\n  .mrqc-result-card.rank1 .mrqc-result-rank{background:var(--t);}\n  .mrqc-result-card.rank2 .mrqc-result-rank{background:var(--soft);}\n  .mrqc-result-card.rank3 .mrqc-result-rank{background:var(--warn);}\n  .mrqc-result-card.has-compromise .mrqc-result-rank{background:var(--amber);color:#451A03;}\n  .mrqc-result-name{font-size:13.5px;font-weight:700;margin:0 0 2px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}\n  .mrqc-result-match{font-size:10px;font-weight:700;background:var(--t);color:#fff;padding:1px 6px;border-radius:3px;letter-spacing:.04em;}\n  .mrqc-result-card:not(.rank1) .mrqc-result-match{background:var(--soft);}\n  .mrqc-result-card.has-compromise .mrqc-result-match{background:var(--amber);color:#451A03;}\n  .mrqc-result-mr-note{font-size:10px;font-weight:700;color:var(--t-d);background:var(--paper);border:1px solid var(--border);padding:1px 6px;border-radius:3px;letter-spacing:.04em;}\n  .mrqc-result-tag{font-size:11.5px;color:var(--soft);margin:0 0 4px;line-height:1.4;}\n  .mrqc-result-compromise{font-size:11px;color:#92400E;background:rgba(251,191,36,.15);border-left:2px solid var(--amber);padding:4px 8px;border-radius:3px;margin:0 0 6px;line-height:1.4;}\n  .mrqc-result-link{font-size:11px;font-weight:500;color:var(--t-d);text-decoration:underline;text-underline-offset:2px;text-decoration-color:rgba(0,137,123,.35);}\n  .mrqc-result-link:hover{text-decoration-color:var(--t);}\n  .mrqc-result-cta{background:var(--ink);color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;display:inline-block;}\n  .mrqc-result-cta:hover{background:var(--t-d);color:#fff;}\n  .mrqc-result-card.rank1 .mrqc-result-cta{background:var(--t);}\n  .mrqc-result-card.rank1 .mrqc-result-cta:hover{background:var(--t-d);}\n\n  @media (max-width:520px){\n    .mrqc-q{font-size:16.5px;}\n    .mrqc-opt{padding:11px 32px 11px 12px;}\n    .mrqc-opt-t{font-size:13px;}\n    .mrqc-opt-d{font-size:11px;}\n    .mrqc-opt.blocked::after{position:static;display:block;margin-top:6px;}\n    .mrqc-verdict-title{font-size:14.5px;}\n    .mrqc-result-card{grid-template-columns:24px 1fr;}\n    .mrqc-result-cta{grid-column:1/-1;text-align:center;margin-top:4px;}\n  }\n\n  /* =====================================================\n     POLISH LAYER — type, couleur, ombres, micro-détails\n     ===================================================== */\n  .mrqc-wrap{\n    --t:#00897B; --t-d:#00574E; --t-l:#E6F4F1;\n    --ink:#0A1929; --soft:#475569; --mute:#94A3B8;\n    --paper:#FAFAF7; --paper2:#FFFFFF;\n    --border:#E8E4DA; --border-s:#CBD5E1;\n    --amber:#E0A82E; --amber-bg:#FBF1D9;\n    font-family:\"Geist\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", \"Inter\", system-ui, sans-serif;\n    font-feature-settings:\"ss01\",\"cv11\";\n    border:none;\n    border-radius:0;\n    box-shadow:none;\n    background:#ffffff;\n  }\n  .mrqc-wrap .mrqc-left{border-right:none !important;}\n  .mrqc-wrap .mrqc-right{background:#ffffff !important;}\n  @media (max-width:760px){\n    .mrqc-wrap .mrqc-left{border-bottom:none !important;}\n  }\n\n  /* Kicker plus premium */\n  .mrqc-wrap .mrqc-kicker{font-size:10.5px;letter-spacing:.18em;color:var(--t-d);}\n  .mrqc-wrap .mrqc-kicker::before{width:20px;height:1.5px;background:linear-gradient(90deg, var(--t), var(--t-d));}\n\n  /* Step badge */\n  .mrqc-wrap .mrqc-step-badge{\n    background:#fff; border:1px solid var(--border);\n    box-shadow:0 1px 0 rgba(15,23,42,.03);\n    padding:5px 11px; letter-spacing:-.005em;\n  }\n\n  /* Progress bar — plus fine, plus lisse */\n  .mrqc-wrap .mrqc-prog{gap:5px;}\n  .mrqc-wrap .mrqc-prog span{height:3px;border-radius:99px;background:#EEE9DD;}\n  .mrqc-wrap .mrqc-prog span.on{\n    background:linear-gradient(90deg, #00897B, #00BFA5);\n    box-shadow:0 1px 0 rgba(0,137,123,.18);\n  }\n\n  /* Question — type editorial */\n  .mrqc-wrap .mrqc-q{\n    font-size:21px; font-weight:600;\n    letter-spacing:-0.022em; line-height:1.25;\n    color:#0A1929;\n  }\n  .mrqc-wrap .mrqc-q em{\n    background:linear-gradient(180deg, transparent 58%, rgba(0,137,123,.22) 58%, rgba(0,137,123,.22) 92%, transparent 92%);\n    padding:0 2px; border-radius:0; color:inherit;\n    font-style:normal; font-weight:700;\n  }\n  .mrqc-wrap .mrqc-q-sub{font-size:13px;color:#64748B;letter-spacing:-.005em;}\n\n  /* Options — hover & selected raffinés */\n  .mrqc-wrap .mrqc-opt{\n    border:1px solid var(--border);\n    box-shadow:0 1px 0 rgba(15,23,42,.025);\n    transition:border-color .18s, background .18s, box-shadow .18s, transform .18s;\n  }\n  .mrqc-wrap .mrqc-opt:hover{\n    border-color:var(--t);\n    background:var(--t-l);\n    box-shadow:0 1px 0 rgba(15,23,42,.025), 0 8px 18px -10px rgba(0,137,123,.22);\n  }\n  .mrqc-wrap .mrqc-opt.selected,\n  .mrqc-wrap .mrqc-opt.prio-1{\n    border-color:var(--t);\n    background:linear-gradient(180deg, #ECF7F4, #E6F4F1);\n    box-shadow:0 0 0 3px rgba(0,137,123,.08), 0 1px 0 rgba(15,23,42,.025);\n  }\n  .mrqc-wrap .mrqc-opt.prio-2{\n    border-color:#D4A22E;\n    background:linear-gradient(180deg, #FEF6DE, #FCEFC8);\n    box-shadow:0 0 0 3px rgba(212,162,46,.1), 0 1px 0 rgba(15,23,42,.025);\n  }\n  .mrqc-wrap .mrqc-opt-t{font-weight:600;letter-spacing:-.01em;}\n  .mrqc-wrap .mrqc-opt-d{color:#64748B;}\n\n  /* Broker tiles polish */\n  .mrqc-wrap .mrqc-bk{\n    border:1px solid var(--border);\n    box-shadow:0 1px 0 rgba(15,23,42,.025);\n    transition:border-color .18s, background .18s, box-shadow .18s, transform .18s;\n  }\n  .mrqc-wrap .mrqc-bk:hover{\n    border-color:var(--t);\n    background:var(--t-l);\n    transform:translateY(-1px);\n    box-shadow:0 6px 14px -8px rgba(15,23,42,.18);\n  }\n  .mrqc-wrap .mrqc-bk.selected{\n    border-color:var(--t);\n    background:linear-gradient(180deg, #ECF7F4, #E6F4F1);\n    box-shadow:0 0 0 3px rgba(0,137,123,.1);\n  }\n  .mrqc-wrap .mrqc-bk-logo{\n    background:transparent !important;\n    box-shadow:none;\n    padding:0;\n    overflow:hidden;\n  }\n  .mrqc-wrap .mrqc-bk-logo img{\n    width:100%; height:100%;\n    object-fit:contain;\n    display:block;\n  }\n  .mrqc-wrap .mrqc-sl-logo{\n    background:#FAFAF7 !important;\n    box-shadow:inset 0 0 0 1px rgba(15,23,42,.04);\n    padding:2px;\n  }\n  .mrqc-wrap .mrqc-sl-logo img{\n    width:100%; height:100%;\n    object-fit:contain;\n    display:block;\n  }\n  .mrqc-wrap .mrqc-bk-note{\n    background:#fff; color:#0A1929;\n    border:1px solid var(--border);\n    box-shadow:0 1px 0 rgba(15,23,42,.04);\n    font-variant-numeric:tabular-nums;\n  }\n  .mrqc-wrap .mrqc-bk-mini{transition:border-color .18s, background .18s, color .18s;}\n\n  /* CTAs */\n  .mrqc-wrap .mrqc-cta-next{\n    background:linear-gradient(180deg, #00A593 0%, #006B5F 100%);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.18) inset,\n      0 -1px 0 rgba(0,0,0,.08) inset,\n      0 4px 10px -2px rgba(0,137,123,.35);\n    letter-spacing:-.005em;\n  }\n  .mrqc-wrap .mrqc-cta-next:hover{\n    background:linear-gradient(180deg, #00B89F 0%, #007A6D 100%);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.22) inset,\n      0 -1px 0 rgba(0,0,0,.08) inset,\n      0 6px 14px -2px rgba(0,137,123,.45);\n  }\n  .mrqc-wrap .mrqc-cta-next:disabled{\n    background:#CFD8DC;\n    box-shadow:none;\n  }\n  .mrqc-wrap .mrqc-hint{color:#64748B;}\n\n  /* Right panel — fond travaillé */\n  .mrqc-wrap .mrqc-right{\n    background:\n      radial-gradient(420px 280px at 100% 0%, rgba(0,137,123,.05), transparent 60%),\n      radial-gradient(380px 240px at 0% 100%, rgba(184,134,11,.04), transparent 60%),\n      #FAFAFB;\n  }\n  .mrqc-wrap .mrqc-r-title{color:#64748B; letter-spacing:.16em;}\n  .mrqc-wrap .mrqc-r-live{\n    padding:3px 9px 3px 14px;\n    background:rgba(0,137,123,.08);\n    border-radius:99px;\n    letter-spacing:.08em;\n  }\n  .mrqc-wrap.done .mrqc-r-live{background:rgba(5,150,105,.1);}\n  .mrqc-wrap .mrqc-r-live::before{left:6px;}\n\n  /* Shortlist items */\n  .mrqc-wrap .mrqc-sl-item{\n    box-shadow:0 1px 0 rgba(15,23,42,.025);\n    transition:opacity .4s, border-color .2s, box-shadow .2s, background .2s, order .4s;\n  }\n  .mrqc-wrap .mrqc-sl-item.top{\n    box-shadow:0 0 0 1px var(--t), 0 6px 14px -8px rgba(0,137,123,.25);\n  }\n  .mrqc-wrap .mrqc-sl-item.winner{\n    background:linear-gradient(180deg, #ECF7F4, #E6F4F1) !important;\n    box-shadow:0 0 0 1.5px var(--t), 0 8px 20px -8px rgba(0,137,123,.3);\n  }\n  .mrqc-wrap .mrqc-sl-logo{\n    box-shadow:inset 0 0 0 1px rgba(15,23,42,.04);\n  }\n  .mrqc-wrap .mrqc-sl-pts-base{\n    background:#fff; color:#94A3B8;\n    border:1px solid var(--border);\n  }\n  .mrqc-wrap .mrqc-sl-pts-badge{\n    background:linear-gradient(180deg, #ECF7F4, #DDF0EB);\n    color:var(--t-d);\n    border:1px solid rgba(0,137,123,.18);\n    box-shadow:0 1px 0 rgba(255,255,255,.6) inset;\n    font-variant-numeric:tabular-nums;\n  }\n\n  /* Verdict — éditorial, profond */\n  .mrqc-wrap .mrqc-verdict{\n    background:\n      radial-gradient(140% 100% at 100% 0%, rgba(255,255,255,.18), transparent 55%),\n      radial-gradient(120% 100% at 0% 100%, rgba(0,0,0,.18), transparent 55%),\n      linear-gradient(160deg, #003B33 0%, #00897B 100%) !important;\n    border:1px solid rgba(0,40,36,.25) !important;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.08) inset,\n      0 14px 32px -14px rgba(0,90,80,.5);\n    padding:18px 20px !important;\n    border-radius:12px !important;\n  }\n  .mrqc-wrap .mrqc-verdict-lbl{letter-spacing:.18em; opacity:.85;}\n  .mrqc-wrap .mrqc-verdict-title{\n    font-family:\"Instrument Serif\", \"Geist\", serif !important;\n    font-size:26px !important; font-weight:400 !important;\n    letter-spacing:-.005em !important;\n    line-height:1.18 !important;\n    margin-bottom:8px !important;\n  }\n  .mrqc-wrap .mrqc-verdict-title span[style*=\"underline\"]{\n    text-decoration:underline !important;\n    text-decoration-color:rgba(255,255,255,.45) !important;\n    text-decoration-thickness:1px !important;\n    text-underline-offset:4px !important;\n    font-style:italic;\n  }\n  .mrqc-wrap .mrqc-verdict-desc{font-size:13px !important; opacity:.92 !important;}\n\n  /* Compromise banner — plus net */\n  .mrqc-wrap .mrqc-compromise-banner{\n    background:linear-gradient(180deg, #FDF6E0, #FBF1D9);\n    border:1px solid #E5C557;\n    box-shadow:0 1px 0 rgba(255,255,255,.6) inset;\n    border-radius:12px;\n  }\n\n  /* Compare box — accent à gauche raffiné */\n  .mrqc-wrap .mrqc-compare-box{\n    background:linear-gradient(180deg, #fff, #FCFEFD);\n    border:1px solid #D6E8E4;\n    border-left:none;\n    padding:0 !important;\n    border-radius:12px;\n    box-shadow:0 1px 0 rgba(15,23,42,.03), 0 2px 8px -4px rgba(15,23,42,.06);\n    position:relative;\n    overflow:hidden;\n  }\n  .mrqc-wrap .mrqc-compare-box::before{\n    content:\"\"; position:absolute; left:0; top:0; bottom:0; width:3px;\n    background:linear-gradient(180deg, var(--t), var(--t-d));\n  }\n  .mrqc-wrap .mrqc-compare-box > *:not(.mrqc-alt-box){padding-left:18px; padding-right:18px;}\n  .mrqc-wrap .mrqc-compare-lbl{padding-top:14px;}\n  .mrqc-wrap .mrqc-compare-text:last-child,\n  .mrqc-wrap .mrqc-compare-args:last-child{padding-bottom:14px;}\n  .mrqc-wrap .mrqc-compare-args{padding-bottom:14px;}\n  .mrqc-wrap .mrqc-compare-args li::before{\n    color:#fff; background:var(--t);\n    width:13px; height:13px; border-radius:99px;\n    display:flex; align-items:center; justify-content:center;\n    font-size:9px; line-height:1;\n    top:2px;\n  }\n  .mrqc-wrap .mrqc-compare-args li{padding-left:20px;}\n  .mrqc-wrap .mrqc-alt-box{\n    margin:0 !important;\n    border-radius:0;\n    border:none;\n    border-top:1px dashed var(--border-s);\n    background:#FAFAF7;\n    padding:12px 18px !important;\n  }\n\n  /* Result cards */\n  .mrqc-wrap .mrqc-result-card{\n    box-shadow:0 1px 0 rgba(15,23,42,.025);\n    transition:box-shadow .2s, border-color .2s;\n    border-radius:12px;\n  }\n  .mrqc-wrap .mrqc-result-card.rank1{\n    background:linear-gradient(180deg, #ECF7F4, #E6F4F1) !important;\n    box-shadow:0 0 0 1.5px var(--t), 0 10px 24px -10px rgba(0,137,123,.28);\n  }\n  .mrqc-wrap .mrqc-result-card.has-compromise{\n    background:linear-gradient(180deg, #FDF6E0, #FBF1D9) !important;\n    box-shadow:0 0 0 1.5px #E5C557, 0 10px 24px -10px rgba(212,162,46,.25);\n  }\n  .mrqc-wrap .mrqc-result-rank{\n    box-shadow:0 1px 0 rgba(255,255,255,.2) inset, 0 2px 4px rgba(15,23,42,.15);\n    font-variant-numeric:tabular-nums;\n  }\n  .mrqc-wrap .mrqc-result-card.rank1 .mrqc-result-rank{\n    background:linear-gradient(180deg, #00A593, #00574E);\n  }\n  .mrqc-wrap .mrqc-result-match{letter-spacing:.04em; font-variant-numeric:tabular-nums;}\n  .mrqc-wrap .mrqc-result-cta{\n    background:linear-gradient(180deg, #1A2940, #0A1929);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.12) inset,\n      0 -1px 0 rgba(0,0,0,.18) inset,\n      0 3px 8px -2px rgba(15,23,42,.3);\n    letter-spacing:-.005em;\n    transition:background .15s, box-shadow .15s, transform .15s;\n  }\n  .mrqc-wrap .mrqc-result-card.rank1 .mrqc-result-cta{\n    background:linear-gradient(180deg, #00A593, #00574E);\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.18) inset,\n      0 -1px 0 rgba(0,0,0,.1) inset,\n      0 4px 10px -2px rgba(0,137,123,.4);\n  }\n  .mrqc-wrap .mrqc-result-cta:hover{transform:translateY(-1px);}\n  .mrqc-wrap .mrqc-result-name{font-size:14px; letter-spacing:-.012em;}\n  .mrqc-wrap .mrqc-result-tag{color:#64748B;}\n  .mrqc-wrap .mrqc-result-mr-note{font-variant-numeric:tabular-nums;}\n\n  /* Left panel subtle paper */\n  .mrqc-wrap .mrqc-left{\n    background:\n      radial-gradient(600px 280px at 0% 0%, rgba(0,137,123,.025), transparent 60%),\n      #fff;\n  }\n\n  /* Nav buttons */\n  .mrqc-wrap .mrqc-back, .mrqc-wrap .mrqc-restart{\n    border-radius:6px;\n    padding:6px 10px 6px 8px;\n    transition:color .15s, background .15s;\n  }\n  .mrqc-wrap .mrqc-back:hover, .mrqc-wrap .mrqc-restart:hover{\n    color:var(--t-d);\n    background:var(--t-l);\n  }\n\n  /* Tabular nums everywhere numbers live */\n  .mrqc-wrap .mrqc-step-badge,\n  .mrqc-wrap .mrqc-sl-rank,\n  .mrqc-wrap .mrqc-bk-note{font-variant-numeric:tabular-nums;}\n  <\u002Fstyle>\n\n  <div class=\"mrqc-grid\">\n    <div class=\"mrqc-left\">\n      <div class=\"mrqc-head\">\n        <div class=\"mrqc-kicker\">Diagnostic Broker<\u002Fdiv>\n        <div class=\"mrqc-step-badge\" data-mrqc-badge=\"\"><b>1<\u002Fb> / 7<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mrqc-prog\" data-mrqc-prog=\"\">\n        <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Étape 1 : Broker actuel -->\n      <div class me+\" se limite aux marchés européens et américains. <b>\"+recName+\"<\u002Fb> ouvre l'Asie et les marchés émergents, soit \"+r.nb_actifs.toLocaleString('fr-FR')+\"+ actifs au total.\"; } },\n      { if: function(c,r,s){ return !c.plans_dca && r.plans_dca && s.q6==='dca'; },\n        text: function(c,r,s,curName,recName){ return \"Avec <b>\"+recName+\"<\u002Fb>, tu programmes ton DCA mensuel gratuitement. \"+curName+\" ne propose pas cette automatisation.\"; } },\n      { if: function(c,r,s){ return s._curr_key==='tr' && s.q2==='adv' && !c.cfd; },\n        text: function(c,r,s,curName,recName){ return \"Trade Republic est imbattable pour débuter, mais sans CFD ni options. <b>\"+recName+\"<\u002Fb> ouvre ces marchés sans sacrifier les frais.\"; } },\n      { if: function(c,r,s){ return (s._curr_key==='bb' || s._curr_key==='fo') && (s.q5==='big' || s.q5==='xl'); },\n        text: function(c,r,s,curName,recName){ return \"Pour tes volumes annuels, les frais de \"+curName+\" (\"+c.fee_pct+\") deviennent significatifs. <b>\"+recName+\"<\u002Fb> applique <b>\"+r.fee_order+\"<\u002Fb>, soit une structure bien plus avantageuse.\"; } },\n      { if: function(c,r,s){ return !c.bank && r.bank && s.q3==='aio'; },\n        text: function(c,r,s,curName,recName){ return \"<b>\"+recName+\"<\u002Fb> combine bourse et banque dans une seule appli, là où \"+curName+\" t'oblige à jongler entre deux comptes.\"; } },\n      { if: function(c,r,s){ return !c.pro_charts && r.pro_charts && (s.q7_p1==='outils' || s.q7_p2==='outils'); },\n        text: function(c,r,s,curName,recName){ return \"<b>\"+recName+\"<\u002Fb> intègre des plateformes pros (ProRealTime, TradingView, MT4 selon le broker), outils que \"+curName+\" ne propose pas.\"; } },\n      { if: function(c,r,s){ return r.nb_actifs > c.nb_actifs * 2 && (s.q7_p1==='act' || s.q7_p2==='act'); },\n        text: function(c,r,s,curName,recName){ return \"<b>\"+recName+\"<\u002Fb> couvre <b>\"+r.nb_actifs.toLocaleString('fr-FR')+\"+ actifs<\u002Fb> (actions, ETF, obligations, dérivés) contre ~\"+c.nb_actifs.toLocaleString('fr-FR')+\" chez \"+curName+\".\"; } },\n      { if: function(c,r,s){ return !c.fr && r.fr && (s.q7_p1==='fr' || s.q7_p2==='fr'); },\n        text: function(c,r,s,curName,recName){ return \"<b>\"+recName+\"<\u002Fb> dispose d'un support client en français basé en France, ce que \"+curName+\" ne propose pas dans ta langue.\"; } },\n      { if: function(c,r,s){ var cRemu=parseFloat(c.cash_remu)||0; var rRemu=parseFloat(r.cash_remu)||0; return rRemu-cRemu>=2 && (s.q7_p1==='frais' || s.q5==='med' || s.q5==='big' || s.q5==='xl'); },\n        text: function(c,r,s,curName,recName){ return \"<b>\"+recName+\"<\u002Fb> rémunère tes liquidités non investies à <b>\"+r.cash_remu+\"<\u002Fb>, contre \"+c.cash_remu+\" chez \"+curName+\" : bonus net sur ton cash disponible.\"; } },\n      { if: function(c,r,s){ return s.q2==='debut' && BROKER_PROFILE[s._reco_key] && BROKER_PROFILE[s._curr_key] && BROKER_PROFILE[s._reco_key].simplicity - BROKER_PROFILE[s._curr_key].simplicity >= 2; },\n        text: function(c,r,s,curName,recName){ return \"<b>\"+recName+\"<\u002Fb> est conçu pour débuter sereinement, avec une interface plus claire et pédagogique que \"+curName+\".\"; } },\n      { if: function(c,r,s){ return true; },\n        text: function(c,r,s,curName,recName){ return \"Selon ton profil, <b>\"+recName+\"<\u002Fb> est un meilleur match que \"+curName+\", notamment sur les dimensions qui comptent le plus pour toi.\"; } }\n    ];\n\n    function getRecoStrengths(recoKey, state){\n      var profile = BROKER_PROFILE[recoKey];\n      var facts = BROKER_FACTS[recoKey];\n      var args = [];\n      if(facts.pea && state.q3==='pea') args.push(\"PEA disponible\" + (facts.pea_jeune?\" (PEA Jeune également)\":\"\"));\n      if(facts.cfd && (state.q2==='adv' || state.q3==='cfd')) args.push(\"CFD et instruments dérivés couverts\");\n      if(facts.plans_dca && state.q6==='dca') args.push(\"Plans DCA automatiques et gratuits\");\n      if(facts.bank && state.q3==='aio') args.push(\"Compte bancaire intégré (carte, IBAN)\");\n      if(facts.intl_full && state.q4==='intl') args.push(\"Accès marchés Asie et émergents\");\n      if(facts.fr && (state.q7_p1==='fr' || state.q7_p2==='fr')) args.push(\"Support client en français\");\n      if(profile.fees_low >= 8 && (state.q7_p1==='frais' || state.q7_p2==='frais')) args.push(\"Parmi les frais les plus bas du marché\");\n      if(profile.pro_tools >= 8 && (state.q7_p1==='outils' || state.q7_p2==='outils')) args.push(\"Plateforme professionnelle (graphiques, APIs)\");\n      if(profile.beginner_friendly >= 8 && state.q2==='debut') args.push(\"Interface pensée pour les débutants\");\n      if(facts.nb_actifs >= 20000 && (state.q7_p1==='act' || state.q7_p2==='act')) args.push(\"Catalogue d'actifs très large (\" + facts.nb_actifs.toLocaleString('fr-FR') + \"+)\");\n      var cashRemu = parseFloat(facts.cash_remu) || 0;\n      if(cashRemu >= 2) args.push(\"Liquidités rémunérées à \" + facts.cash_remu);\n      if(BROKERS[recoKey].mr_score >= 4.5) args.push(\"Note MoneyRadar \" + BROKERS[recoKey].mr_score.toString().replace('.',',') + \"/5\");\n      return args.slice(0, 3);\n    }\n\n    function generateCompare(currKey, recoKey, state){\n      if(!currKey || currKey==='aucun' || currKey==='autre' || !BROKERS[currKey]) return null;\n      var c = BROKER_FACTS[currKey], r = BROKER_FACTS[recoKey];\n      if(!c || !r) return null;\n      state._curr_key = currKey;\n      state._reco_key = recoKey;\n      var picked = [];\n      for(var i=0; i<COMPARISONS.length && picked.length<2; i++){\n        if(COMPARISONS[i].if(c, r, state)) picked.push(COMPARISONS[i].text(c, r, state, BROKERS[currKey].name, BROKERS[recoKey].name));\n      }\n      return { mainText: picked[0], secondaryText: picked[1], strengths: getRecoStrengths(recoKey, state) };\n    }\n\n    // ============================================================\n    // 7. ÉTAT\n    // ============================================================\n    var state = {q1:null, q2:null, q3:null, q4:null, q5:null, q6:null, q7_p1:null, q7_p2:null, step:1};\n\n    var sl = root.querySelector('[data-mrqc-sl]');\n    var sub = root.querySelector('[data-mrqc-sub]');\n    var badge = root.querySelector('[data-mrqc-badge]');\n    var progSpans = root.querySelectorAll('[data-mrqc-prog] span');\n    var resultsBox = root.querySelector('[data-mrqc-results]');\n    var compareBox = root.querySelector('[data-mrqc-compare]');\n    var compareLbl = root.querySelector('[data-mrqc-compare-lbl]');\n    var compareText = root.querySelector('[data-mrqc-compare-text]');\n    var compareArgs = root.querySelector('[data-mrqc-compare-args]');\n    var altBox = root.querySelector('[data-mrqc-alt]');\n    var altText = root.querySelector('[data-mrqc-alt-text]');\n    var verdictTitle = root.querySelector('[data-mrqc-verdict-title]');\n    var verdictDesc = root.querySelector('[data-mrqc-verdict-desc]');\n    var finishBtn = root.querySelector('[data-finish]');\n    var compromiseBanner = root.querySelector('[data-mrqc-compromise-banner]');\n    var compromiseBannerText = root.querySelector('[data-mrqc-compromise-banner-text]');\n\n    var slItems = {};\n    BROKER_KEYS.forEach(function(k){\n      var b = BROKERS[k];\n      var el = document.createElement('div');\n      el.className = 'mrqc-sl-item mrqc-sl-' + k;\n      el.style.order = 50;\n      el.innerHTML =\n        '<div class=\"mrqc-sl-rank\">#<\u002Fdiv>' +\n        '<div class=\"mrqc-sl-logo\"><img src=\"' + b.logoUrl + '\" alt=\"' + b.name + '\"><\u002Fdiv>' +\n        '<div class=\"mrqc-sl-name\">' + b.name + '<span class=\"mrqc-sl-pts\"><span class=\"mrqc-sl-pts-base\">·<\u002Fspan><\u002Fspan><\u002Fdiv>' +\n        '<div><\u002Fdiv>';\n      sl.appendChild(el);\n      slItems[k] = el;\n    });\n\n    // ============================================================\n    // 8. SCORING (avec prior éditorial, inchangé)\n    // ============================================================\n    function computeScore(broker){\n      var profile = BROKER_PROFILE[broker];\n      if(!profile) return 0;\n      var mult = {};\n      Object.keys(profile).forEach(function(d){ mult[d] = 1.0; });\n      ['q2','q3','q4','q5','q6'].forEach(function(q){\n        var v = state[q]; if(!v) return;\n        var w = (WEIGHTS[q] && WEIGHTS[q][v]) || {};\n        Object.keys(w).forEach(function(d){ if(mult[d] !== undefined) mult[d] *= w[d]; });\n      });\n      if(state.q7_p1){\n        var w1 = (WEIGHTS.q7_p1 && WEIGHTS.q7_p1[state.q7_p1]) || {};\n        Object.keys(w1).forEach(function(d){ if(mult[d] !== undefined) mult[d] *= w1[d]; });\n      }\n      if(state.q7_p2){\n        var w2 = (WEIGHTS.q7_p2 && WEIGHTS.q7_p2[state.q7_p2]) || {};\n        Object.keys(w2).forEach(function(d){ if(mult[d] !== undefined) mult[d] *= w2[d]; });\n      }\n      var score = 0;\n      Object.keys(profile).forEach(function(d){ score += profile[d] * mult[d]; });\n      var mrScore = BROKERS[broker].mr_score || 3.0;\n      score *= (1 + Math.max(0, (mrScore - 3.0)) * 0.03);\n      return score;\n    }\n\n    // ============================================================\n    // 9. DQ HIÉRARCHISÉS (cœur du fix v4)\n    // ============================================================\n    // Retourne les DQ actifs pour un broker, en distinguant hard et soft\n    // et en tenant compte des DQ levés (liftedSoftDQs).\n    function computeBrokerDQ(broker, liftedSoftDQs){\n      var hardReasons = [];\n      var softReasons = [];\n\n      // Q3 = pea\n      if(state.q3 === 'pea' && DQ_RULES.q3_pea.targets[broker]){\n        hardReasons.push({rule:'q3_pea', reason:DQ_RULES.q3_pea.targets[broker]});\n      }\n      // Q3 = cfd\n      if(state.q3 === 'cfd' && DQ_RULES.q3_cfd.targets[broker]){\n        hardReasons.push({rule:'q3_cfd', reason:DQ_RULES.q3_cfd.targets[broker]});\n      }\n      // Q6 = daily (soft)\n      if(state.q6 === 'daily' && DQ_RULES.q6_daily.targets[broker]){\n        if(liftedSoftDQs.indexOf('q6_daily') === -1)\n          softReasons.push({rule:'q6_daily', reason:DQ_RULES.q6_daily.targets[broker]});\n      }\n      // Q4 = intl (soft)\n      if(state.q4 === 'intl' && DQ_RULES.q4_intl.targets[broker]){\n        if(liftedSoftDQs.indexOf('q4_intl') === -1)\n          softReasons.push({rule:'q4_intl', reason:DQ_RULES.q4_intl.targets[broker]});\n      }\n      // Q2 = adv (soft)\n      if(state.q2 === 'adv' && DQ_RULES.q2_adv.targets[broker]){\n        if(liftedSoftDQs.indexOf('q2_adv') === -1)\n          softReasons.push({rule:'q2_adv', reason:DQ_RULES.q2_adv.targets[broker]});\n      }\n      // Q2 = debut (soft)\n      if(state.q2 === 'debut' && DQ_RULES.q2_debut.targets[broker]){\n        if(liftedSoftDQs.indexOf('q2_debut') === -1)\n          softReasons.push({rule:'q2_debut', reason:DQ_RULES.q2_debut.targets[broker]});\n      }\n      // Q3 = aio (soft)\n      if(state.q3 === 'aio' && DQ_RULES.q3_aio.targets[broker]){\n        if(liftedSoftDQs.indexOf('q3_aio') === -1)\n          softReasons.push({rule:'q3_aio', reason:DQ_RULES.q3_aio.targets[broker]});\n      }\n\n      return {hard:hardReasons, soft:softReasons, all:hardReasons.concat(softReasons)};\n    }\n\n    // Détermine quels SOFT DQ doivent être levés pour avoir >=3 brokers qualifiés\n    function determineLiftedDQs(){\n      var lifted = [];\n      // Test progressif : on lève dans l'ordre SOFT_LIFT_ORDER jusqu'à avoir >=3 qualifiés\n      for(var attempt = 0; attempt <= SOFT_LIFT_ORDER.length; attempt++){\n        var qualified = 0;\n        BROKER_KEYS.forEach(function(k){\n          var dq = computeBrokerDQ(k, lifted);\n          if(dq.all.length === 0) qualified++;\n        });\n        if(qualified >= 3) break;\n        // Lever le prochain SOFT DQ qui est actif\n        var nextToLift = null;\n        for(var i=0; i<SOFT_LIFT_ORDER.length; i++){\n          var rule = SOFT_LIFT_ORDER[i];\n          if(lifted.indexOf(rule) !== -1) continue;\n          // Vérifier que cette règle est actuellement active (un broker en pâtit)\n          var ruleActive = false;\n          BROKER_KEYS.forEach(function(k){\n            var dq = computeBrokerDQ(k, lifted);\n            dq.soft.forEach(function(s){ if(s.rule === rule) ruleActive = true; });\n          });\n          if(ruleActive){ nextToLift = rule; break; }\n        }\n        if(!nextToLift) break;\n        lifted.push(nextToLift);\n      }\n      return lifted;\n    }\n\n    function rankedBrokers(){\n      // Pendant le quiz (avant Q7 complète), on n'applique pas le système de levée\n      // Calcul final si on est sur le résultat OU si toutes les réponses sont là\n      var allAnswered = state.q1 && state.q2 && state.q3 && state.q4 && state.q5 && state.q6 && state.q7_p1 && state.q7_p2;\n      var liftedSoftDQs = allAnswered ? determineLiftedDQs() : [];\n\n      var list = BROKER_KEYS.map(function(k){\n        var dq = computeBrokerDQ(k, liftedSoftDQs);\n        // Pour l'affichage shortlist en cours de quiz : tous les DQ actifs\n        var dqInProgress = computeBrokerDQ(k, []);\n        return {\n          key: k,\n          score: computeScore(k),\n          dqReasons: dq.all.map(function(d){ return d.reason; }),\n          hardDQ: dq.hard.map(function(d){ return d.reason; }),\n          softDQ_lifted: liftedSoftDQs.length > 0 ? dqInProgress.soft.filter(function(s){ return liftedSoftDQs.indexOf(s.rule) !== -1; }).map(function(d){ return {rule:d.rule, reason:d.reason}; }) : [],\n          isRescued: false,\n          dqInProgress: dqInProgress.all.map(function(d){ return d.reason; }),\n          mrScore: BROKERS[k].mr_score\n        };\n      });\n\n      // Marquer comme rescued ceux qui ont eu un soft DQ levé\n      list.forEach(function(item){\n        item.isRescued = item.softDQ_lifted.length > 0 && item.dqReasons.length === 0;\n      });\n\n      list.sort(function(a, b){\n        var aDq = a.dqReasons.length > 0 ? 1 : 0;\n        var bDq = b.dqReasons.length > 0 ? 1 : 0;\n        if(aDq !== bDq) return aDq - bDq;\n        // Brokers rescued après les \"purs\" qualifiés\n        var aResc = a.isRescued ? 1 : 0;\n        var bResc = b.isRescued ? 1 : 0;\n        if(aResc !== bResc) return aResc - bResc;\n        if(Math.abs(b.score - a.score) > 0.1) return b.score - a.score;\n        return b.mrScore - a.mrScore;\n      });\n\n      var top = list[0] && list[0].dqReasons.length===0 ? list[0].score : 1;\n      list.forEach(function(item){\n        item.pctMatch = top > 0 ? Math.round((item.score / top) * 100) : 0;\n        if(item.pctMatch > 100) item.pctMatch = 100;\n      });\n      list._liftedDQs = liftedSoftDQs;\n      return list;\n    }\n\n    // ============================================================\n    // 10. Q7 (top 2)\n    // ============================================================\n    function handleQ7Click(value){\n      if(state.q7_p1 === value){ state.q7_p1 = state.q7_p2; state.q7_p2 = null; }\n      else if(state.q7_p2 === value){ state.q7_p2 = null; }\n      else if(!state.q7_p1){ state.q7_p1 = value; }\n      else if(!state.q7_p2){ state.q7_p2 = value; }\n      else { state.q7_p2 = value; }\n    }\n\n    // ============================================================\n    // 11. GESTION DES OPTIONS BLOQUÉES\n    // ============================================================\n    function updateBlockedOptions(){\n      root.querySelectorAll('.mrqc-opt[data-q]').forEach(function(el){\n        var q = el.getAttribute('data-q');\n        var v = el.getAttribute('data-v');\n        var blocked = BLOCK_OPTIONS[q] && BLOCK_OPTIONS[q][v] && BLOCK_OPTIONS[q][v](state);\n        el.classList.toggle('blocked', !!blocked);\n      });\n    }\n\n    // ============================================================\n    // 12. RENDU\n    // ============================================================\n    function render(){\n      updateBlockedOptions();\n\n      root.querySelectorAll('.mrqc-step').forEach(function(s){ s.classList.remove('active'); });\n      var activeStep = state.step === 'result' ? 'result' : String(state.step);\n      var target = root.querySelector('.mrqc-step[data-step=\"' + activeStep + '\"]');\n      if(target) target.classList.add('active');\n\n      if(state.step === 'result'){ badge.innerHTML = '&#10003; <b>Termin&eacute;<\u002Fb>'; }\n      else { badge.innerHTML = '<b>' + state.step + '<\u002Fb> / 7'; }\n\n      var answeredFlags = [!!state.q1, !!state.q2, !!state.q3, !!state.q4, !!state.q5, !!state.q6, !!(state.q7_p1 && state.q7_p2)];\n      progSpans.forEach(function(sp, i){ sp.classList.toggle('on', answeredFlags[i]); });\n\n      root.querySelectorAll('.mrqc-opt,.mrqc-bk').forEach(function(el){\n        var q = el.getAttribute('data-q'); var v = el.getAttribute('data-v');\n        el.classList.remove('selected', 'prio-1', 'prio-2');\n        if(q === 'q7'){\n          if(state.q7_p1 === v) el.classList.add('prio-1');\n          else if(state.q7_p2 === v) el.classList.add('prio-2');\n        } else {\n          if(state[q] === v) el.classList.add('selected');\n        }\n      });\n\n      if(finishBtn){ finishBtn.disabled = !(state.q7_p1 && state.q7_p2); }\n\n      var answered = answeredFlags.filter(Boolean).length;\n      if(state.step === 'result'){ sub.innerHTML = '<b>Classement final<\u002Fb> : 14 dimensions + prior &eacute;ditorial.'; root.classList.add('done'); }\n      else if(answered === 0){ sub.innerHTML = 'En attente de votre <b>1<sup>re<\u002Fsup> r&eacute;ponse<\u002Fb>&hellip;'; root.classList.remove('done'); }\n      else {\n        var remaining = 7 - answered;\n        sub.innerHTML = 'Bas&eacute; sur <b>' + answered + ' r&eacute;ponse' + (answered>1?'s':'') + '<\u002Fb>' + (remaining > 0 ? ', ' + remaining + ' restante' + (remaining>1?'s':'') + '.' : '.');\n        root.classList.remove('done');\n      }\n\n      var isFinal = state.step === 'result';\n      var hasAnswer = answered > 1;\n      var ranked = rankedBrokers();\n      var liftedDQs = ranked._liftedDQs || [];\n\n      ranked.forEach(function(info, idx){\n        var k = info.key; var el = slItems[k];\n        el.style.order = idx + 1;\n        el.classList.remove('lit','dq','rescued','top','winner','current','show-rank');\n\n        // En cours de quiz, on affiche les DQ \"naturels\" (sans levée)\n        var displayDQ = isFinal ? info.dqReasons : info.dqInProgress;\n\n        if(displayDQ.length > 0){\n          el.classList.add('dq');\n        } else if(isFinal && info.isRescued){\n          el.classList.add('rescued');\n        } else if(hasAnswer || isFinal){\n          el.classList.add('lit');\n        }\n\n        if(state.q1 === k && !isFinal && displayDQ.length === 0){\n          el.classList.add('current');\n        }\n\n        var ptsEl = el.querySelector('.mrqc-sl-pts');\n        var ptsHTML;\n        if(hasAnswer && displayDQ.length === 0){\n          ptsHTML = '<span class=\"mrqc-sl-pts-badge\">' + info.pctMatch + '% match<\u002Fspan>';\n        } else {\n          ptsHTML = '<span class=\"mrqc-sl-pts-base\">·<\u002Fspan>';\n        }\n        if(displayDQ.length > 0){\n          ptsHTML = '<span class=\"mrqc-sl-dq\">&#10005; ' + displayDQ[0] + '<\u002Fspan>';\n        }\n        if(isFinal && info.isRescued && info.softDQ_lifted.length > 0){\n          ptsHTML = '<span class=\"mrqc-sl-compromise\">&#9888; ' + info.softDQ_lifted[0].reason + '<\u002Fspan>';\n        }\n        ptsEl.innerHTML = ptsHTML;\n\n        var rankEl = el.querySelector('.mrqc-sl-rank');\n        if(isFinal){\n          rankEl.textContent = '#' + (idx + 1);\n          el.classList.add('show-rank');\n          if(info.dqReasons.length === 0){\n            if(idx < 3) el.classList.add('top');\n            if(idx === 0 && !info.isRescued) el.classList.add('winner');\n          }\n        } else {\n          rankEl.textContent = '#';\n        }\n      });\n\n      if(isFinal){\n        // Bandeau de transparence si compromis levés\n        if(liftedDQs.length > 0){\n          var liftMsgs = liftedDQs.map(function(rule){ return DQ_RULES[rule].lift_msg; }).join(', ');\n          compromiseBanner.style.display = '';\n          compromiseBannerText.innerHTML = \"Aucun broker ne coche <b>100&nbsp;%<\u002Fb> de tes crit&egrave;res. Pour te proposer un Top 3, nous avons assoupli le crit&egrave;re&nbsp;: <b>\" + liftMsgs + \"<\u002Fb>. Les brokers marqu&eacute;s &laquo;&nbsp;compromis&nbsp;&raquo; ci-dessous ne r&eacute;pondent pas parfaitement, mais restent les meilleurs choix pour ton profil.\";\n        } else {\n          compromiseBanner.style.display = 'none';\n        }\n\n        var qualified = ranked.filter(function(r){ return r.dqReasons.length === 0; });\n        var top3 = qualified.slice(0, 3);\n        var top1Key = top3[0] ? top3[0].key : null;\n        var top2Key = top3[1] ? top3[1].key : null;\n\n        var brokerActuelEstTop1 = state.q1 && state.q1 === top1Key && state.q1 !== 'aucun' && state.q1 !== 'autre';\n        var recoKey = brokerActuelEstTop1 ? top2Key : top1Key;\n\n        if(brokerActuelEstTop1){\n          verdictTitle.innerHTML = \"Tu es d&eacute;j&agrave; chez le meilleur broker pour ton profil&nbsp;\\u2713\";\n          verdictDesc.innerHTML = \"<b>\"+BROKERS[state.q1].name+\"<\u002Fb> correspond \\u00e0 tes besoins. Ci-dessous, nos arguments confirm\\u00e9s + une alternative.\";\n        } else if(state.q1 && state.q1 !== 'aucun' && state.q1 !== 'autre' && BROKERS[state.q1]){\n          verdictTitle.innerHTML = \"Selon ton profil, tu gagnerais &agrave; passer chez <span style='text-decoration:underline'>\"+BROKERS[top1Key].name+\"<\u002Fspan>\";\n          verdictDesc.innerHTML = \"Voici pourquoi par rapport &agrave; \"+BROKERS[state.q1].name+\", et le top 3 complet.\";\n        } else {\n          verdictTitle.innerHTML = \"Voici le broker qui te correspond le mieux&nbsp;: <span style='text-decoration:underline'>\"+BROKERS[top1Key].name+\"<\u002Fspan>\";\n          verdictDesc.innerHTML = \"Classement bas&eacute; sur tes 7 r&eacute;ponses + prior &eacute;ditorial MoneyRadar.\";\n        }\n\n        if(state.q1 && state.q1 !== 'aucun' && state.q1 !== 'autre' && recoKey){\n          if(brokerActuelEstTop1){\n            var stateClone = Object.assign({}, state);\n            compareBox.style.display = '';\n            compareLbl.textContent = \"Pourquoi tu es au bon endroit\";\n            compareText.innerHTML = \"Avec ton profil, <b>\"+BROKERS[state.q1].name+\"<\u002Fb> coche les bonnes cases. Ses points forts par rapport \\u00e0 tes priorit\\u00e9s\\u00a0:\";\n            var ownStrengths = getRecoStrengths(state.q1, stateClone);\n            compareArgs.innerHTML = ownStrengths.map(function(s){ return '<li>'+s+'<\u002Fli>'; }).join('');\n            if(top2Key){\n              altBox.style.display = '';\n              altText.innerHTML = \"<b>\"+BROKERS[top2Key].name+\"<\u002Fb> arrive second du classement, \\u00e0 consid\\u00e9rer si tu veux diversifier tes brokers ou tester autre chose.\";\n            } else { altBox.style.display = 'none'; }\n          } else {\n            var compareData = generateCompare(state.q1, recoKey, state);\n            if(compareData){\n              compareBox.style.display = '';\n              compareLbl.textContent = \"Pourquoi ce changement\";\n              compareText.innerHTML = compareData.mainText + (compareData.secondaryText ? ' ' + compareData.secondaryText : '');\n              compareArgs.innerHTML = compareData.strengths.map(function(s){ return '<li>'+s+'<\u002Fli>'; }).join('');\n              altBox.style.display = 'none';\n            } else { compareBox.style.display = 'none'; }\n          }\n        } else if(state.q1 === 'aucun'){\n          compareBox.style.display = '';\n          compareLbl.textContent = \"Premier broker\";\n          compareText.innerHTML = \"Pour ton premier broker, <b>\"+BROKERS[recoKey].name+\"<\u002Fb> coche les bonnes cases pour ton profil.\";\n          var firstStrengths = getRecoStrengths(recoKey, state);\n          compareArgs.innerHTML = firstStrengths.map(function(s){ return '<li>'+s+'<\u002Fli>'; }).join('');\n          altBox.style.display = 'none';\n        } else if(state.q1 === 'autre'){\n          compareBox.style.display = '';\n          compareLbl.textContent = \"Selon ton profil\";\n          compareText.innerHTML = \"Selon tes r\\u00e9ponses, <b>\"+BROKERS[recoKey].name+\"<\u002Fb> est le meilleur match. Compare-le \\u00e0 ton broker actuel sur ces points\\u00a0:\";\n          var otherStrengths = getRecoStrengths(recoKey, state);\n          compareArgs.innerHTML = otherStrengths.map(function(s){ return '<li>'+s+'<\u002Fli>'; }).join('');\n          altBox.style.display = 'none';\n        } else { compareBox.style.display = 'none'; }\n\n        // Cartes résultat avec mention compromis\n        resultsBox.innerHTML = top3.map(function(info, i){\n          var b = BROKERS[info.key];\n          var isCurrentBroker = state.q1 === info.key;\n          var compromiseHTML = '';\n          if(info.isRescued && info.softDQ_lifted.length > 0){\n            var msg = info.softDQ_lifted.map(function(s){ return s.reason; }).join(' ; ');\n            compromiseHTML = '<p class=\"mrqc-result-compromise\">&#9888; Compromis sur ce broker : '+msg+'<\u002Fp>';\n          }\n          return '<div class=\"mrqc-result-card rank' + (i+1) + (info.isRescued ? ' has-compromise':'') + '\">' +\n            '<div class=\"mrqc-result-rank\">' + (i+1) + '<\u002Fdiv>' +\n            '<div>' +\n              '<p class=\"mrqc-result-name\">' + b.name +\n                (isCurrentBroker ? ' <span class=\"mrqc-result-match\" style=\"background:var(--gold)\">TON BROKER<\u002Fspan>' : '') +\n                ' <span class=\"mrqc-result-match\">' + info.pctMatch + '% match<\u002Fspan>' +\n                ' <span class=\"mrqc-result-mr-note\">MR ' + b.mr_score.toString().replace('.',',') + '/5<\u002Fspan>' +\n              '<\u002Fp>' +\n              '<p class=\"mrqc-result-tag\">' + b.tag + '<\u002Fp>' +\n              compromiseHTML +\n              '<a href=\"' + b.url + '\" class=\"mrqc-result-link\" target=\"_blank\" rel=\"noopener\">Lire notre avis &rarr;<\u002Fa>' +\n            '<\u002Fdiv>' +\n            '<a href=\"' + b.go + '\" class=\"mrqc-result-cta\" target=\"_blank\" rel=\"noopener sponsored\">D&eacute;couvrir &rarr;<\u002Fa>' +\n          '<\u002Fdiv>';\n        }).join('');\n      }\n    }\n\n    // ============================================================\n    // 13. EVENTS\n    // ============================================================\n    root.addEventListener('click', function(e){\n      var back = e.target.closest('[data-back]');\n      if(back){\n        if(state.step === 'result'){ state.step = 7; }\n        else if(typeof state.step === 'number' && state.step > 1){\n          var prevQ = 'q' + (state.step - 1);\n          if(prevQ === 'q7'){ state.q7_p1 = null; state.q7_p2 = null; }\n          else { state[prevQ] = null; }\n          state.step = state.step - 1;\n        }\n        render(); return;\n      }\n      var restart = e.target.closest('[data-restart]');\n      if(restart){\n        state = {q1:null,q2:null,q3:null,q4:null,q5:null,q6:null,q7_p1:null,q7_p2:null,step:1};\n        render(); return;\n      }\n      var finish = e.target.closest('[data-finish]');\n      if(finish && !finish.disabled){ state.step = 'result'; render(); return; }\n      var pick = e.target.closest('[data-q]');\n      if(pick){\n        // Bloquer le clic sur une option bloquée\n        if(pick.classList.contains('blocked')) return;\n        var q = pick.getAttribute('data-q'); var v = pick.getAttribute('data-v');\n        if(q === 'q7'){ handleQ7Click(v); render(); return; }\n        state[q] = v;\n        var qNum = parseInt(q.substr(1), 10);\n        if(qNum < 7){ state.step = qNum + 1; }\n        render();\n      }\n    });\n\n    render();\n  })();\n  <\u002Fscript>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
